        .timeline { position: relative; margin-left: 18px; }

        .event { position: relative; margin: 16px 0 16px 16px; }
        .event-dot { position: absolute; left: -6px; top: 14px; width: 12px; height: 12px; background: var(--primary, #2aa9ff); border-radius: 999px; box-shadow: 0 0 0 2px rgba(42,169,255,.15); }
        .event-card { margin-left: 16px; }

    </style>
